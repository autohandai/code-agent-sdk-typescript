name: Release SDK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Stable version bump when version is empty
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Explicit stable version, for example 1.0.2
        required: false
        type: string
      publish_existing:
        description: Publish current version when the GitHub release already exists
        required: true
        default: false
        type: boolean
      dist_tag:
        description: npm distribution tag for manual stable releases
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release SDK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Restore Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION_INPUT: ${{ inputs.version }}
          BUMP_INPUT: ${{ inputs.bump }}
          DIST_TAG_INPUT: ${{ inputs.dist_tag }}
          PUBLISH_EXISTING_INPUT: ${{ inputs.publish_existing }}
        run: |
          set -euo pipefail

          publish_existing="${PUBLISH_EXISTING_INPUT:-false}"
          latest_stable_tag="$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1 || true
          )"

          if [ -n "$latest_stable_tag" ]; then
            stable_base="${latest_stable_tag#v}"
          else
            stable_base="$(node -p "require('./package.json').version.split('-')[0]")"
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            short_sha="$(printf '%.7s' "$GITHUB_SHA")"
            version="${stable_base}-alpha.${GITHUB_RUN_NUMBER}.${short_sha}"
            release_kind="alpha"
            prerelease="true"
            dist_tag="alpha"
            npm version "$version" --no-git-tag-version --allow-same-version
          elif [ "$publish_existing" = "true" ]; then
            version="${VERSION_INPUT#v}"
            if [ -z "$version" ]; then
              version="$(node -p "require('./package.json').version")"
            fi

            package_version="$(node -p "require('./package.json').version")"
            if [ "$version" != "$package_version" ]; then
              echo "::error::publish_existing version '$version' must match package.json version '$package_version'."
              exit 1
            fi

            release_kind="existing"
            prerelease="$([[ "$version" == *-* ]] && echo true || echo false)"
            dist_tag="${DIST_TAG_INPUT:-latest}"
          else
            if [ -n "$VERSION_INPUT" ]; then
              version="${VERSION_INPUT#v}"
            else
              IFS=. read -r major minor patch <<< "$stable_base"
              case "${BUMP_INPUT:-patch}" in
                major)
                  major=$((major + 1))
                  minor=0
                  patch=0
                  ;;
                minor)
                  minor=$((minor + 1))
                  patch=0
                  ;;
                patch)
                  patch=$((patch + 1))
                  ;;
                *)
                  echo "::error::Unsupported stable bump '${BUMP_INPUT:-patch}'."
                  exit 1
                  ;;
              esac
              version="${major}.${minor}.${patch}"
            fi

            release_kind="stable"
            prerelease="false"
            dist_tag="${DIST_TAG_INPUT:-latest}"
            npm version "$version" --no-git-tag-version --allow-same-version
          fi

          if ! node -e "const semver = process.argv[1]; if (!/^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[0-9A-Za-z.-]+)?$/.test(semver)) process.exit(1)" "$version"; then
            echo "::error::Version '$version' is not a valid npm package version."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "release_kind=$release_kind" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "publish_existing=$publish_existing" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"
          echo "latest_stable_tag=$latest_stable_tag" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        if: steps.version.outputs.publish_existing != 'true'
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          latest_stable_tag="${{ steps.version.outputs.latest_stable_tag }}"
          release_kind="${{ steps.version.outputs.release_kind }}"
          date="$(date -u +%Y-%m-%d)"
          range=""

          if [ -n "$latest_stable_tag" ]; then
            range="${latest_stable_tag}..HEAD"
          fi

          {
            echo "## ${tag} - ${date}"
            echo
            if [ "$release_kind" = "alpha" ]; then
              echo "> Bleeding edge alpha build from main."
            else
              echo "> Stable release."
            fi
            echo
            echo "### Changes"
            echo
            if [ -n "$range" ]; then
              git log "$range" --pretty=format:'- %s (%h)' --no-merges \
                | grep -v '^.*chore(release):' || true
            else
              git log -n 20 --pretty=format:'- %s (%h)' --no-merges \
                | grep -v '^.*chore(release):' || true
            fi
          } > release-notes.md

          if ! grep -q '^- ' release-notes.md; then
            printf -- '- Maintenance release.\n' >> release-notes.md
          fi

          printf '\n' >> release-notes.md

          if [ -f CHANGELOG.md ] && head -n 1 CHANGELOG.md | grep -qx '# Changelog'; then
            {
              echo "# Changelog"
              echo
              cat release-notes.md
              tail -n +2 CHANGELOG.md | sed '/./,$!d'
            } > CHANGELOG.md.tmp
          else
            {
              echo "# Changelog"
              echo
              cat release-notes.md
              if [ -f CHANGELOG.md ]; then
                cat CHANGELOG.md
              fi
            } > CHANGELOG.md.tmp
          fi

          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Verify version is unpublished
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="${{ steps.version.outputs.version }}"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "::error::$package_name@$package_version is already published on npm."
            exit 1
          fi

          if [ "${{ steps.version.outputs.publish_existing }}" != "true" ] && git ls-remote --exit-code --tags origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists on origin."
            exit 1
          fi

      - name: Validate package
        run: bun run prepublishOnly

      - name: Build release package artifact
        run: |
          package_file="$(
            npm pack --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename));"
          )"

          tar -tzf "$package_file" | grep -qx "package/README.md"
          tar -tzf "$package_file" | grep -qx "package/CHANGELOG.md"
          tar -xOf "$package_file" package/README.md | grep -q "Other Programming Languages"
          shasum -a 256 "$package_file" > "$package_file.sha256"
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"

      - name: Configure npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$npmrc"
            chmod 0600 "$npmrc"
            npm whoami
          else
            echo "NPM_TOKEN is not configured; falling back to npm Trusted Publishing if configured."
          fi

      - name: Verify npm publish access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Skipping token permission preflight because NPM_TOKEN is not configured."
            exit 0
          fi

          package_name="$(node -p "require('./package.json').name")"
          npm_user="$(npm whoami)"
          access_json="$(npm access list packages "$npm_user" --json)"

          ACCESS_JSON="$access_json" node -e "
            const packageName = process.argv[1];
            const packages = JSON.parse(process.env.ACCESS_JSON || '{}');
            const permission = packages[packageName];

            if (!permission || !String(permission).toLowerCase().includes('write')) {
              console.error(packageName + ' is not writable by the configured NPM_TOKEN account. Update the npm granular token so user ' + process.argv[2] + ' has publish/write access to this package.');
              process.exit(1);
            }
          " "$package_name" "$npm_user"

      - name: Commit version and changelog
        if: steps.version.outputs.publish_existing != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"

      - name: Tag release
        if: steps.version.outputs.publish_existing != 'true'
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install -g npm@latest
          npm publish "$PACKAGE_FILE" --access public --provenance --tag "${{ steps.version.outputs.dist_tag }}"

      - name: Push version and tag
        if: steps.version.outputs.publish_existing != 'true'
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.publish_existing != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_kind == 'alpha' && format('Bleeding Edge {0}', steps.version.outputs.tag) || format('Release {0}', steps.version.outputs.tag) }}
          body_path: release-notes.md
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            *.tgz
            *.tgz.sha256
