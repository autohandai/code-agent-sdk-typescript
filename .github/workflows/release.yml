name: Release SDK

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump when version is empty
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      version:
        description: Explicit version, for example 1.0.1
        required: false
        type: string
      prerelease_identifier:
        description: Prerelease identifier for prerelease bumps
        required: false
        default: beta
        type: string
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        default: false
        type: boolean
      dist_tag:
        description: npm distribution tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create versioned GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Restore Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: npm ci

      - name: Resolve and bump package version
        id: version
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version }}
          BUMP_INPUT: ${{ inputs.bump }}
          PREID_INPUT: ${{ inputs.prerelease_identifier }}
        run: |
          set -euo pipefail

          if [ -n "$VERSION_INPUT" ]; then
            version="${VERSION_INPUT#v}"
            npm version "$version" --no-git-tag-version --allow-same-version
          elif [ "$BUMP_INPUT" = "prerelease" ]; then
            npm version prerelease --preid "${PREID_INPUT:-beta}" --no-git-tag-version
            version="$(node -p "require('./package.json').version")"
          else
            npm version "$BUMP_INPUT" --no-git-tag-version
            version="$(node -p "require('./package.json').version")"
          fi

          if ! node -e "const semver = process.argv[1]; if (!/^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[0-9A-Za-z.-]+)?$/.test(semver)) process.exit(1)" "$version"; then
            echo "::error::Version '$version' is not a valid npm package version."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify version is unpublished
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="${{ steps.version.outputs.version }}"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "::error::$package_name@$package_version is already published on npm."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists on origin."
            exit 1
          fi

      - name: Validate package
        run: bun run prepublishOnly

      - name: Build release package artifact
        run: |
          package_file="$(
            npm pack --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename));"
          )"

          tar -tzf "$package_file" | grep -qx "package/README.md"
          tar -xOf "$package_file" package/README.md | grep -q "Other Programming Languages"
          shasum -a 256 "$package_file" > "$package_file.sha256"
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Tag release
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push version and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            Release for `@autohandai/agent-sdk` `${{ steps.version.outputs.version }}`.

            The npm package is published by the `Package CI and npm release` workflow when this GitHub release is published.
          prerelease: ${{ inputs.prerelease }}
          files: |
            *.tgz
            *.tgz.sha256

      - name: Resolve npm dist-tag
        id: dist-tag
        run: |
          tag="${{ inputs.dist_tag }}"

          if [ "${{ inputs.prerelease }}" = "true" ] && [ "$tag" = "latest" ]; then
            tag="next"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: |
          npm install -g npm@latest
          npm publish "$PACKAGE_FILE" --access public --provenance --tag "${{ steps.dist-tag.outputs.tag }}"
