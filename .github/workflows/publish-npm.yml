name: Package CI and npm release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: Workflow mode to run
        required: true
        default: validate
        type: choice
        options:
          - validate
          - test
          - canary
          - release
      dist_tag:
        description: npm distribution tag for manual release mode
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: npm-package-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ inputs.mode || 'auto' }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: true

      - name: Restore Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Verify bundled CLI assets
        run: |
          if [ ! -d cli ] || [ -z "$(find cli -maxdepth 1 -type f -print -quit)" ]; then
            echo "::error::No bundled CLI assets were found in ./cli."
            exit 1
          fi

          for file in cli/*; do
            if [ ! -s "$file" ]; then
              echo "::error::$file is empty."
              exit 1
            fi

            if grep -a -q "git-lfs.github.com/spec/v1" "$file"; then
              echo "::error::$file is still a Git LFS pointer. The real CLI binary was not restored."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build package
        run: bun run build

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Verify README is packaged
        run: |
          npm pack --dry-run --json \
            | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => { const files = JSON.parse(input)[0].files.map(file => file.path); if (!files.includes('README.md')) { console.error('README.md is missing from the npm package.'); process.exit(1); } });"

      - name: Verify package size budget
        run: |
          package_size="$(
            npm pack --dry-run --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].size));"
          )"
          max_package_size=$((250 * 1024 * 1024))

          if [ "$package_size" -gt "$max_package_size" ]; then
            echo "::error::Packed npm tarball is $package_size bytes, above the 250 MiB release budget."
            exit 1
          fi

      - name: Build dependency update package
        if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        run: |
          package_file="$(
            npm pack --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename));"
          )"

          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"

      - name: Upload dependency update package
        if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        uses: actions/upload-artifact@v7
        with:
          name: dependency-update-package-${{ github.run_id }}
          path: "*.tgz"
          retention-days: 7

  test:
    name: Test package
    needs:
      - validate
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'test' || inputs.mode == 'canary' || inputs.mode == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: true

      - name: Restore Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: bun run test

      - name: Validate examples
        run: bun run test:examples

      - name: Compile examples
        run: bun run build:examples

  publish_canary:
    name: Publish npm canary
    needs:
      - validate
      - test
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'canary'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: true

      - name: Restore Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: npm ci

      - name: Create canary version
        run: |
          base_version="$(node -p "require('./package.json').version.split('-')[0]")"
          short_sha="$(printf '%.7s' "$GITHUB_SHA")"
          canary_version="${base_version}-canary.${GITHUB_RUN_NUMBER}.sha${short_sha}"

          npm version "$canary_version" --no-git-tag-version --allow-same-version
          echo "CANARY_VERSION=$canary_version" >> "$GITHUB_ENV"

      - name: Verify canary version is unpublished
        run: |
          package_name="$(node -p "require('./package.json').name")"

          if npm view "$package_name@$CANARY_VERSION" version >/dev/null 2>&1; then
            echo "::error::$package_name@$CANARY_VERSION is already published on npm."
            exit 1
          fi

      - name: Configure npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > ~/.npmrc
            npm whoami
          else
            echo "NPM_TOKEN is not configured; falling back to npm Trusted Publishing if configured."
          fi

      - name: Validate package
        run: bun run prepublishOnly

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Verify package size budget
        run: |
          package_size="$(
            npm pack --dry-run --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].size));"
          )"
          max_package_size=$((250 * 1024 * 1024))

          if [ "$package_size" -gt "$max_package_size" ]; then
            echo "::error::Packed npm tarball is $package_size bytes, above the 250 MiB release budget."
            exit 1
          fi

      - name: Publish canary package
        run: |
          npm install -g npm@latest
          npm publish --access public --provenance --tag canary

  publish_release:
    name: Publish npm release
    needs:
      - validate
      - test
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: true

      - name: Restore Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: npm ci

      - name: Verify package version is unpublished
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "::error::$package_name@$package_version is already published on npm."
            exit 1
          fi

      - name: Configure npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > ~/.npmrc
            npm whoami
          else
            echo "NPM_TOKEN is not configured; falling back to npm Trusted Publishing if configured."
          fi

      - name: Validate package
        run: bun run prepublishOnly

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Verify package size budget
        run: |
          package_size="$(
            npm pack --dry-run --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].size));"
          )"
          max_package_size=$((250 * 1024 * 1024))

          if [ "$package_size" -gt "$max_package_size" ]; then
            echo "::error::Packed npm tarball is $package_size bytes, above the 250 MiB release budget."
            exit 1
          fi

      - name: Build release package artifact
        run: |
          package_file="$(
            npm pack --json \
              | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename));"
          )"

          shasum -a 256 "$package_file" > "$package_file.sha256"
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-release-package-${{ github.run_id }}
          path: |
            *.tgz
            *.tgz.sha256
          retention-days: 30

      - name: Resolve npm dist-tag
        id: dist-tag
        run: |
          tag="${{ inputs.dist_tag }}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish release package
        run: |
          npm install -g npm@latest
          npm publish "$PACKAGE_FILE" --access public --provenance --tag "${{ steps.dist-tag.outputs.tag }}"
